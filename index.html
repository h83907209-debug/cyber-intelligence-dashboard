<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intelligence Lookup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section id="loginView" class="panel login-panel">
        <p class="eyebrow">Secure Access</p>
        <h1>Intelligence Lookup</h1>
        <p class="subtext">Sign in to search verified intelligence records.</p>

        <form id="loginForm" class="stack" autocomplete="off">
          <label for="username">Username</label>
          <input id="username" type="text" required />

          <label for="password">Password</label>
          <input id="password" type="password" required />

          <button type="submit">Login</button>
          <p id="loginError" class="feedback"></p>
        </form>
      </section>

      <section id="searchView" class="hidden" aria-hidden="true">
        <header class="topbar">
          <div>
            <p class="eyebrow">Lookup Console</p>
            <h2>Intelligence Search</h2>
          </div>
          <button id="logoutBtn" class="secondary" type="button">Logout</button>
        </header>

        <section class="panel search-panel">
          <form id="searchForm" class="search-row">
            <input id="searchInput" type="text" inputmode="tel" placeholder="Enter phone number" required />
            <button type="submit">Search</button>
          </form>
          <p id="searchError" class="feedback"></p>
        </section>

        <section class="panel result-panel">
          <h3>Report</h3>
          <div id="resultCards" class="result-grid"></div>
        </section>
      </section>
    </main>

    <div id="scanOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-inner">
        <div class="magnifier" aria-hidden="true"></div>
        <p id="scanMessage">Initializing search...</p>
      </div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
