<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu Lookup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section id="loginView" class="screen">
        <div class="card login-card">
          <img id="loginPikachu" class="pikachu login-art" src="" alt="Pikachu illustration" />
          <p class="kicker">Secure Access</p>
          <h1>Pika Intel Lookup</h1>
          <p class="muted">Login to access intelligence search.</p>

          <form id="loginForm" class="form" autocomplete="off">
            <label for="username">Username</label>
            <input id="username" type="text" required />

            <label for="password">Password</label>
            <input id="password" type="password" required />

            <button type="submit">Login</button>
            <p id="loginError" class="error-text"></p>
          </form>
        </div>
      </section>

      <section id="searchView" class="screen hidden" aria-hidden="true">
        <header class="header">
          <div class="brand">
            <img id="brandPikachu" class="pikachu brand-art" src="" alt="Pikachu icon" />
            <div>
              <p class="kicker">Intelligence Lookup</p>
              <h2>Phone Search</h2>
            </div>
          </div>
          <button id="logoutBtn" class="secondary" type="button">Logout</button>
        </header>

        <section class="card search-card">
          <form id="searchForm" class="search-form">
            <label for="countryCode">Country Code</label>
            <select id="countryCode" required>
              <option value="+91">India (+91)</option>
              <option value="+1">United States (+1)</option>
              <option value="+44">United Kingdom (+44)</option>
              <option value="+1">Canada (+1)</option>
              <option value="+61">Australia (+61)</option>
              <option value="+49">Germany (+49)</option>
              <option value="+33">France (+33)</option>
            </select>

            <label for="searchInput">Phone Number</label>
            <div class="search-row">
              <input id="searchInput" type="tel" inputmode="numeric" placeholder="Enter phone number" required />
              <button type="submit">Search</button>
            </div>
            <p id="searchError" class="error-text"></p>
          </form>
        </section>

        <section class="card result-card">
          <div class="results-head">
            <h3>Results</h3>
            <img id="resultsPikachu" class="pikachu tiny-art" src="" alt="Pikachu decorative" />
          </div>
          <div id="resultCards" class="result-grid"></div>
        </section>
      </section>
    </main>

    <div id="scanOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-content">
        <div class="runner-track" aria-hidden="true">
          <div class="runner">
            <img id="runFrameA" src="" alt="" class="frame frame-a" />
            <img id="runFrameB" src="" alt="" class="frame frame-b" />
          </div>
        </div>
        <p id="scanMessage" class="overlay-text">Initializing Search...</p>
      </div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
